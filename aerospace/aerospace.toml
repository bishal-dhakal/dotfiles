# AeroSpace config — install: ~/dotfiles/aerospace/install.sh
#
# Dual-monitor + fullscreen: keep "Displays have separate Spaces" ON or the other
# screen goes black during native fullscreen. Run: ~/dotfiles/aerospace/fix-displays.sh
# then log out and back in. Use alt-f (AeroSpace fullscreen), not the green button.
# alt-shift-f exits native fullscreen if stuck.

after-login-command = []

after-startup-command = [
  'exec-and-forget sketchybar >> $HOME/.sketchybar/service.log 2>&1',
  'exec-and-forget borders style=round order=above width=1.5 active_color=0xff656a75 inactive_color=0xff3b3f49',
  'exec-and-forget aerospace balance-sizes',
]

exec-on-workspace-change = ['/bin/bash', '-c', 'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE']

on-focus-changed = [
  'exec-and-forget sketchybar --trigger aerospace_focus_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

# Don't move the mouse when switching monitors — helps keep focus on the target screen
on-focused-monitor-changed = []

automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.right = 0
outer.bottom = 0
outer.top = [
  { monitor."built-in" = 0 },
  { monitor."benq" = 36 },
  36,
]

[mode.main.binding]

alt-b = 'exec-and-forget open -a /Applications/Brave\ Browser.app'
alt-c = 'exec-and-forget open -a /Applications/Cursor.app'
alt-s = 'exec-and-forget open -a /Applications/Slack.app'
alt-t = 'exec-and-forget open -a /Applications/Alacritty.app'
alt-g = 'exec-and-forget open -a /Applications/Google\ Chrome.app'
alt-n = 'exec-and-forget open -a /Applications/Notion.app'
alt-shift-r = ['exec-and-forget /opt/homebrew/bin/sketchybar --reload']

alt-e = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
# AeroSpace tiling fullscreen — does NOT black out the other monitor
alt-f = 'fullscreen --no-outer-gaps'
# Escape macOS native fullscreen (green button / video fullscreen) if the other screen goes black
alt-shift-f = ['fullscreen off', 'macos-native-fullscreen off']

alt-leftSquareBracket = 'focus-monitor 1'
alt-rightSquareBracket = 'focus-monitor 2'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'
alt-shift-c = 'reload-config'

alt-1 = ['focus-monitor 1', 'workspace 1']
alt-2 = ['focus-monitor 2', 'workspace 2']
alt-3 = ['focus-monitor 2', 'workspace 3']
alt-4 = ['focus-monitor 2', 'workspace 4']
alt-5 = ['focus-monitor 2', 'workspace 5']
alt-6 = ['focus-monitor 2', 'workspace 6']
alt-7 = ['focus-monitor 2', 'workspace 7']
alt-8 = ['focus-monitor 2', 'workspace 8']
alt-9 = ['focus-monitor 2', 'workspace 9']

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'com.brave.Browser.app.adcclpceapdbhchilkbngkehpppaefko'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'notion.id'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating']

# 1 = laptop (Built-in); 2–9 = external (BenQ)
[workspace-to-monitor-force-assignment]
1 = 1
2 = 2
3 = 2
4 = 2
5 = 2
6 = 2
7 = 2
8 = 2
9 = 2
